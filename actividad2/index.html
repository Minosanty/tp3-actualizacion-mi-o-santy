<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carga de Alumnos - Panel de Control</title>
    <style>
        :root {
            --primary: #1d4ed8;
            /* azul fuerte */
            --secondary: #0ea5e9;
            /* celeste */
            --danger: #dc2626;
            /* rojo */
            --dark: #0f172a;
            /* negro elegante */
            --gray: #64748b;
            --light: #f1f5f9;
            --white: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #e0f2fe, #f8fafc);
            display: flex;
            justify-content: center;
            padding: 2rem;
        }

        .container {
            width: 100%;
            max-width: 900px;
        }

        /* HEADER */
        header {
            background: var(--dark);
            color: var(--white);
            padding: 1.5rem 2rem;
            border-radius: 10px;
            margin-bottom: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            font-size: 1.3rem;
            letter-spacing: 1px;
        }

        header p {
            font-size: 0.8rem;
            color: var(--secondary);
        }

        /* CARDS */
        .card {
            background: var(--white);
            padding: 2rem;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            margin-bottom: 2rem;
        }

        /* FORM */
        .form-group {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
        }

        .input-item {
            display: flex;
            flex-direction: column;
        }

        label {
            font-size: 0.7rem;
            color: var(--gray);
            margin-bottom: 5px;
        }

        input {
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #e2e8f0;
            outline: none;
            transition: 0.2s;
        }

        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(29, 78, 216, 0.1);
        }

        /* BUTTON */
        button {
            margin-top: 1.5rem;
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 6px;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        /* TABLE */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
        }

        thead {
            background: var(--primary);
            color: white;
        }

        th,
        td {
            padding: 12px;
            text-align: left;
        }

        tbody tr {
            border-bottom: 1px solid #e5e7eb;
            transition: 0.2s;
        }

        tbody tr:hover {
            background: #f1f5f9;
        }

        /* PROMEDIO */
        .promedio-section {
            margin-top: 2rem;
            padding-top: 1rem;
            border-top: 1px solid #e5e7eb;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .promedio-label {
            color: var(--gray);
            font-size: 0.9rem;
        }

        .promedio-value {
            font-size: 2rem;
            font-weight: bold;
            color: var(--danger);
        }

        /* RESPONSIVE */
        @media (max-width: 700px) {
            .form-group {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <h1>Carga Alumnos</h1>
            <p style="color: var(--text-dim); font-size: 0.8rem; margin-top: 0.5rem; letter-spacing: 0.05rem;">REGISTRO
                DE CALIFICACIONES / IP ISOLATION</p>
        </header>

        <section class="card">
            <div class="form-group">
                <div class="input-item">
                    <label for="nombre">Nombre</label>
                    <input type="text" id="nombre" spellcheck="false" autocomplete="off">
                </div>
                <div class="input-item">
                    <label for="edad">Edad</label>
                    <input type="number" id="edad">
                </div>
                <div class="input-item">
                    <label for="nota">Nota</label>
                    <input type="number" step="0.1" id="nota">
                </div>
            </div>
            <button onclick="guardarAlumno()">Registrar</button>
        </section>

        <section class="card" id="tabla-container" style="display: none;">
            <table>
                <thead>
                    <tr>
                        <th>Alumno</th>
                        <th>Edad</th>
                        <th>Nota</th>
                    </tr>
                </thead>
                <tbody id="lista-alumnos"></tbody>
            </table>

            <div class="promedio-section">
                <span class="promedio-label">Promedio de Clase</span>
                <span class="promedio-value" id="promedio-total">0.00</span>
            </div>
        </section>
    </div>

    <script>
        async function cargarDatos() {
            const res = await fetch('/datos');
            const data = await res.json();

            const tbody = document.getElementById('lista-alumnos');
            const container = document.getElementById('tabla-container');

            tbody.innerHTML = '';

            if (data.personas.length > 0) {
                container.style.display = 'block';
                data.personas.forEach(p => {
                    const row = `<tr>
                        <td>${p.nombre}</td>
                        <td>${p.edad}</td>
                        <td style="font-weight: bold">${p.nota.toFixed(2)}</td>
                    </tr>`;
                    tbody.innerHTML += row;
                });
                document.getElementById('promedio-total').textContent = data.promedio;
            } else {
                container.style.display = 'none';
            }
        }

        async function guardarAlumno() {
            const nombre = document.getElementById('nombre').value;
            const edad = document.getElementById('edad').value;
            const nota = document.getElementById('nota').value;

            if (!nombre || !edad || !nota) {
                alert("Por favor, completa todos los campos");
                return;
            }

            const response = await fetch('/guardar', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ nombre, edad, nota })
            });

            if (response.ok) {
                document.getElementById('nombre').value = '';
                document.getElementById('edad').value = '';
                document.getElementById('nota').value = '';
                cargarDatos();
            }
        }

        // Cargar al iniciar
        cargarDatos();
    </script>
</body>

</html>
